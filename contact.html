    <style>
      section {
        margin: 0;
        background: var(--card);
        border: 1px solid var(--surface);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 1.1rem;
      }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.8rem;
        flex-wrap: wrap;
      }
      h1 {
        margin: 0;
      }
      .muted {
        color: var(--ink-soft);
      }
      
      .contact {
        display: flex;
        gap: 0.8rem;
        flex-wrap: wrap;
        margin-top: 1.2rem;
      }
      .contact a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: var(--contact-ink);
        border: 1px solid var(--contact-border);
        background: linear-gradient(135deg, var(--contact-bg-a), var(--contact-bg-b));
        border-radius: 12px;
        width: 44px;
        height: 44px;
        padding: 0;
        transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
      }
      .contact a svg {
        width: 22px;
        height: 22px;
        fill: currentColor;
      }
      .contact a:hover {
        color: var(--contact-hover-ink);
        background: linear-gradient(135deg, var(--contact-hover-bg-a), var(--contact-hover-bg-b));
        transform: translateY(-1px);
      }
      .contact a:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: 2px;
      }

      .notice {
        margin-top: 1.5rem;
        background: var(--surface-soft);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 1rem;
      }
      .notice h3 {
        margin: 0 0 0.5rem 0;
        font-size: 1rem;
      }
      .notice p {
        margin: 0;
        color: var(--ink-soft);
        line-height: 1.6;
      }

      @media (max-width: 900px) {
        .topbar {
          display: flex;
          justify-content: space-between;
          flex-wrap: wrap;
        }
        nav {
          width: 100%;
          justify-content: center;
        }
      }

    <script>
      const i18n = {
        ko: {
          "brand.title": "신하늘",
          "nav.home": "Home",
          "nav.career": "Career",
          "nav.blog": "Blog",
          "nav.contact": "Contact",
          title: "연락처 및 소셜 링크",
          intro: "다양한 채널을 통해 연락하실 수 있습니다.",
          "notice.title": "문의 안내",
          "notice.desc": "가장 빠른 응답이 가능한 채널은 <strong>Discord</strong>입니다.<br/>일반적인 응답 가능 시간은 평일/주말 14:00 - 24:00 입니다.<br/>추후 문의 폼 기능이 추가될 예정입니다.",
          footer: "© 2022-2026 신하늘, All Rights Reserved."
        },
        en: {
          "brand.title": "Shin Haneul",
          "nav.home": "Home",
          "nav.career": "Career",
          "nav.blog": "Blog",
          "nav.contact": "Contact",
          title: "Contact & Social Links",
          intro: "You can reach out through various channels.",
          "notice.title": "Inquiry Notice",
          "notice.desc": "<strong>Discord</strong> is the fastest channel for response.<br/>General available hours are 14:00 - 24:00 (Weekdays/Weekends).<br/>An inquiry form will be added in the future.",
          footer: "© 2022-2026 Shin Haneul, All Rights Reserved."
        }
      };

      const viewState = { lang: "ko" };

      const getInitialLang = () => {
        const queryLang = new URLSearchParams(window.location.search).get("lang");
        if (queryLang && i18n[queryLang]) return queryLang;
        try {
          const savedLang = window.localStorage.getItem("preferredLang");
          if (savedLang && i18n[savedLang]) return savedLang;
        } catch (e) {}
        return "ko";
      };

      const setLang = (lang) => {
        document.documentElement.lang = lang;
        const dict = i18n[lang] || i18n.ko;
        
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (dict[key]) el.innerHTML = dict[key];
        });

        document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
          const key = el.getAttribute("data-i18n-ph");
          if (dict[key]) el.setAttribute("placeholder", dict[key]);
        });

        document.querySelectorAll(".lang").forEach((button) => {
          const isActive = button.dataset.lang === lang;
          button.classList.toggle("active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });

        viewState.lang = lang;
        if (typeof syncNavLang === "function") syncNavLang(lang);
        try {
          window.localStorage.setItem("preferredLang", lang);
        } catch (error) {}
      };

      document.querySelectorAll(".lang").forEach((button) => {
        button.addEventListener("click", () => setLang(button.dataset.lang));
      });

      window.addEventListener("DOMContentLoaded", () => {
        setLang(getInitialLang());
      });
    </script>
