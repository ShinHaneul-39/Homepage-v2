<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | Shin Haneul</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" href="./profile.png" />
    <meta
      name="description"
      content="신하늘의 블로그 페이지입니다. 개발, 운영, 관심 주제의 게시글을 카테고리별로 확인할 수 있습니다."
    />
    <link rel="canonical" href="https://shinhaneul.website/blog.html" />
    <style>
      :root {
        --bg: #f5fbff;
        --ink: #13212d;
        --ink-soft: #425161;
        --line: #d9ebf8;
        --brand: #87ceeb;
        --card: rgba(255, 255, 255, 0.84);
        --shadow: 0 12px 40px rgba(20, 67, 102, 0.12);
        --header-border: #ffffff8c;
        --header-bg-a: #f6fcffe8;
        --header-bg-b: #f6fcffcc;
        --surface: #ffffff;
        --surface-soft: #ffffffd4;
        --chip-active-bg: #e7f6ff;
        --chip-active-line: #9fc9e4;
        --footer-ink: #557085;
      }
      html[data-theme="dark"] {
        color-scheme: dark;
        --bg: #0f151b;
        --ink: #e9f2fa;
        --ink-soft: #b5c4d2;
        --line: #2d3d4c;
        --card: rgba(20, 29, 38, 0.82);
        --shadow: 0 16px 38px rgba(0, 0, 0, 0.45);
        --header-border: #273748cc;
        --header-bg-a: #111a24ee;
        --header-bg-b: #111a24d8;
        --surface: #1b2733;
        --surface-soft: #1f2f3d;
        --chip-active-bg: #223648;
        --chip-active-line: #3f5870;
        --footer-ink: #9db0c1;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: "Noto Sans KR", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      .container {
        width: min(1120px, 92%);
        margin: 0 auto;
      }
      .page-shell {
        flex: 1;
        padding: 2rem 0 2.4rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 20;
        border-bottom: 1px solid var(--header-border);
        background: linear-gradient(180deg, var(--header-bg-a), var(--header-bg-b));
      }
      .topbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 14px 0;
        gap: 0.8rem;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 1.15rem;
      }
      .brand-icon {
        width: 1.8rem;
        height: 1.8rem;
        border-radius: 50%;
        border: 1px solid var(--line);
        object-fit: cover;
      }
      nav,
      .top-actions,
      .tabs,
      .pager {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      nav {
        grid-column: 2;
        justify-self: center;
      }
      .top-actions {
        grid-column: 3;
        justify-self: end;
      }
      .chip,
      .lang,
      .tab,
      .theme-toggle,
      .pager button {
        text-decoration: none;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.4rem 0.72rem;
        background: var(--surface);
        color: var(--ink);
        font-size: 0.85rem;
        cursor: pointer;
      }
      .chip.active,
      .tab.active,
      .pager button.active {
        background: var(--chip-active-bg);
        border-color: var(--chip-active-line);
      }
      .lang.active {
        background: linear-gradient(135deg, var(--brand), #d9f2ff);
        color: #13212d;
      }
      section {
        margin: 0;
        background: var(--card);
        border: 1px solid var(--surface);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 1.1rem;
      }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.8rem;
        flex-wrap: wrap;
      }
      h1 {
        margin: 0;
      }
      .muted {
        color: var(--ink-soft);
      }
      .search {
        margin-top: 0.75rem;
      }
      .search input {
        width: min(460px, 100%);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0.65rem 0.72rem;
        background: var(--surface);
        color: var(--ink);
      }
      .status-line {
        margin: 0;
        font-size: 0.92rem;
        color: var(--ink-soft);
        border: 1px dashed var(--line);
        background: var(--surface-soft);
        border-radius: 12px;
        padding: 0.58rem 0.72rem;
      }
      .grid {
        margin-top: 0.8rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.8rem;
      }
      .post {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--surface-soft);
        padding: 0.9rem;
      }
      .post small {
        color: #64819a;
      }
      .post h2 {
        margin: 0.35rem 0 0.5rem;
        font-size: 1.05rem;
      }
      .post a {
        color: inherit;
      }
      footer {
        text-align: center;
        color: var(--footer-ink);
        padding: 1.5rem 0 2.2rem;
      }
      @media (max-width: 900px) {
        .topbar {
          display: flex;
          justify-content: space-between;
          flex-wrap: wrap;
        }
        nav {
          width: 100%;
          justify-content: center;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container topbar">
        <div class="brand">
          <img class="brand-icon" src="./profile.png" alt="" aria-hidden="true" />
          <span data-i18n="brand.title">신하늘</span>
        </div>
        <nav>
          <a class="chip" href="./index.html" data-i18n="nav.home">Home</a>
          <a class="chip" href="./career.html" data-i18n="nav.career">Career</a>
          <a class="chip active" href="./blog.html" data-i18n="nav.blog">Blog</a>
          <a class="chip" href="./contact.html" data-i18n="nav.contact">Contact</a>
        </nav>
        <div class="top-actions">
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">Dark</button>
          <button class="lang active" data-lang="ko">KO</button>
          <button class="lang" data-lang="en">EN</button>
        </div>
      </div>
    </header>
    <main class="container page-shell">
      <section>
        <div class="head">
          <h1 data-i18n="title">블로그 / 아카이브</h1>
          <span class="muted" data-i18n="desc">카테고리별로 게시글을 탐색하고 상세 페이지로 이동할 수 있습니다.</span>
        </div>
        <div class="tabs">
          <button class="tab active" type="button" data-category="all" data-i18n="all">전체</button>
          <button class="tab" type="button" data-category="c1" data-i18n="c1">디스코드 운영</button>
          <button class="tab" type="button" data-category="c2" data-i18n="c2">개발 기록</button>
          <button class="tab" type="button" data-category="c3" data-i18n="c3">개인 회고</button>
          <button class="tab" type="button" data-category="c4" data-i18n="c4">공지/업데이트</button>
        </div>
        <div class="search">
          <input type="text" data-i18n-ph="search" placeholder="제목/요약 검색" />
        </div>
      </section>
      <section>
        <p id="loadingState" class="status-line" data-i18n="loading">게시글 데이터를 불러오는 중입니다.</p>
        <div class="grid" id="blogGrid"></div>
        <div class="pager" id="pager"></div>
        <p id="emptyState" class="status-line" style="display: none; margin-top: 0.8rem;" data-i18n="empty">조건에 맞는 글이 없습니다.</p>
      </section>
    </main>
    <footer data-i18n="footer">© 2022-2026 신하늘, All Rights Reserved.</footer>
    <script>
      const i18n = {
        ko: {
          "brand.title": "신하늘",
          "nav.home": "Home",
          "nav.career": "Career",
          "nav.blog": "Blog",
          "nav.contact": "Contact",
          title: "블로그 / 아카이브",
          desc: "카테고리별로 게시글을 탐색하고 상세 페이지로 이동할 수 있습니다.",
          all: "전체",
          c1: "디스코드 운영",
          c2: "개발 기록",
          c3: "개인 회고",
          c4: "공지/업데이트",
          search: "제목/요약 검색",
          loading: "게시글 데이터를 불러오는 중입니다.",
          loadFail: "게시글 데이터 로드에 실패했습니다. 잠시 후 다시 시도해 주세요.",
          empty: "조건에 맞는 글이 없습니다.",
          readMore: "자세히 보기",
          footer: "© 2022-2026 신하늘, All Rights Reserved."
        },
        en: {
          "brand.title": "Shin Haneul",
          "nav.home": "Home",
          "nav.career": "Career",
          "nav.blog": "Blog",
          "nav.contact": "Contact",
          title: "Blog / Archive",
          desc: "Browse posts by category and open each post detail page.",
          all: "All",
          c1: "Discord Ops",
          c2: "Dev Log",
          c3: "Retrospective",
          c4: "Notice/Updates",
          search: "Search title/summary",
          loading: "Loading blog posts.",
          loadFail: "Failed to load blog posts. Please try again later.",
          empty: "No posts match your current filters.",
          readMore: "Read More",
          footer: "© 2022-2026 Shin Haneul, All Rights Reserved."
        }
      };

      const navLinks = Array.from(document.querySelectorAll("nav .chip"));
      const themeToggleButton = document.querySelector("[data-theme-toggle]");
      const darkMedia = window.matchMedia("(prefers-color-scheme: dark)");
      const blogGrid = document.getElementById("blogGrid");
      const tabs = Array.from(document.querySelectorAll(".tabs .tab"));
      const searchInput = document.querySelector(".search input");
      const pager = document.getElementById("pager");
      const loadingState = document.getElementById("loadingState");
      const emptyState = document.getElementById("emptyState");
      let postsData = [];

      const viewState = { category: "all", query: "", page: 1, pageSize: 6, lang: "ko" };

      const CAMPAIGN_STORAGE_KEY = "campaignParams:v1";
      const CAMPAIGN_TTL_MS = 30 * 24 * 60 * 60 * 1000;
      const CAMPAIGN_ALLOWED_KEYS = new Set([
        "utm_source",
        "utm_medium",
        "utm_campaign",
        "utm_content",
        "utm_term",
        "utm_id",
        "source_platform",
        "creative_format",
        "marketing_tactic",
        "gclid",
        "fbclid",
        "msclkid"
      ]);
      const CAMPAIGN_MAX_VALUE_LENGTH = 200;

      const normalizeCampaignKey = (key) => String(key || "").trim().toLowerCase();

      const isAllowedCampaignKey = (key) => {
        if (!key) return false;
        return CAMPAIGN_ALLOWED_KEYS.has(key);
      };

      const getSafeCampaignValue = (value) => {
        const raw = String(value || "").trim();
        if (!raw) return "";
        if (raw.length > CAMPAIGN_MAX_VALUE_LENGTH) return "";
        return raw;
      };

      const extractCampaignParams = (search) => {
        const query = new URLSearchParams(search || "");
        const result = {};
        for (const [rawKey, rawValue] of query.entries()) {
          const key = normalizeCampaignKey(rawKey);
          if (!isAllowedCampaignKey(key)) continue;
          const value = getSafeCampaignValue(rawValue);
          if (!value) continue;
          result[key] = value;
        }
        return result;
      };

      const storeCampaignParams = (search) => {
        const nextParams = extractCampaignParams(search);
        if (Object.keys(nextParams).length === 0) return;
        try {
          const existingParams = loadCampaignParams();
          const mergedParams = { ...existingParams, ...nextParams };
          window.localStorage.setItem(
            CAMPAIGN_STORAGE_KEY,
            JSON.stringify({ storedAt: Date.now(), params: mergedParams })
          );
        } catch (error) {}
      };

      const loadCampaignParams = () => {
        try {
          const raw = window.localStorage.getItem(CAMPAIGN_STORAGE_KEY);
          if (!raw) return {};
          const data = JSON.parse(raw);
          if (!data || typeof data !== "object") return {};
          const storedAt = Number(data.storedAt || 0);
          if (!storedAt || Date.now() - storedAt > CAMPAIGN_TTL_MS) {
            window.localStorage.removeItem(CAMPAIGN_STORAGE_KEY);
            return {};
          }
          const params = data.params && typeof data.params === "object" ? data.params : {};
          const sanitized = {};
          Object.keys(params).forEach((rawKey) => {
            const key = normalizeCampaignKey(rawKey);
            if (!isAllowedCampaignKey(key)) return;
            const value = getSafeCampaignValue(params[rawKey]);
            if (value) sanitized[key] = value;
          });
          return sanitized;
        } catch (error) {
          return {};
        }
      };

      const shouldSkipHrefMerge = (href) => {
        const value = String(href || "").trim();
        if (!value) return true;
        if (value.startsWith("#")) return true;
        if (/^(mailto:|tel:|javascript:|data:)/i.test(value)) return true;
        if (value.startsWith("//")) return true;
        const schemeMatch = value.match(/^([a-z][a-z0-9+.-]*):/i);
        if (schemeMatch && !/^https?:/i.test(value)) return true;
        if (/^https?:\/\//i.test(value)) {
          try {
            const url = new URL(value);
            if (url.origin !== window.location.origin) return true;
          } catch (error) {
            return true;
          }
        }
        return false;
      };

      const mergeParamsIntoHref = (href, nextParams) => {
        if (shouldSkipHrefMerge(href)) return href;
        const original = String(href);
        const hashIndex = original.indexOf("#");
        const hash = hashIndex >= 0 ? original.slice(hashIndex) : "";
        const withoutHash = hashIndex >= 0 ? original.slice(0, hashIndex) : original;
        const queryIndex = withoutHash.indexOf("?");
        const path = queryIndex >= 0 ? withoutHash.slice(0, queryIndex) : withoutHash;
        const query = queryIndex >= 0 ? withoutHash.slice(queryIndex + 1) : "";
        const params = new URLSearchParams(query);
        Object.keys(nextParams || {}).forEach((key) => {
          const value = nextParams[key];
          if (value === undefined || value === null || value === "") return;
          params.set(key, String(value));
        });
        const nextQuery = params.toString();
        return nextQuery ? `${path}?${nextQuery}${hash}` : `${path}${hash}`;
      };

      const escapeHtml = (value) =>
        String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");

      const getLocalizedText = (multiLangObject, lang) => {
        if (!multiLangObject || typeof multiLangObject !== "object") return "";
        return multiLangObject[lang] || multiLangObject.ko || "";
      };

      navLinks.forEach((link) => {
        link.dataset.baseHref = (link.getAttribute("href") || "").split("?")[0];
      });

      const getInitialLang = () => {
        const queryLang = new URLSearchParams(window.location.search).get("lang");
        if (queryLang && i18n[queryLang]) return queryLang;
        try {
          const savedLang = window.localStorage.getItem("preferredLang");
          if (savedLang && i18n[savedLang]) return savedLang;
        } catch (error) {
          // Ignore storage access errors.
        }
        return "ko";
      };

      const getResolvedTheme = () => {
        const explicit = document.documentElement.dataset.theme;
        if (explicit === "dark" || explicit === "light") return explicit;
        return darkMedia.matches ? "dark" : "light";
      };

      const syncThemeToggle = () => {
        if (!themeToggleButton) return;
        const isDark = getResolvedTheme() === "dark";
        themeToggleButton.textContent = isDark ? "Light" : "Dark";
        themeToggleButton.setAttribute("aria-pressed", String(isDark));
      };

      const applyStoredTheme = () => {
        try {
          const savedTheme = window.localStorage.getItem("preferredTheme");
          if (savedTheme === "dark" || savedTheme === "light") {
            document.documentElement.dataset.theme = savedTheme;
          }
        } catch (error) {
          // Ignore storage access errors.
        }
      };

      const syncNavLang = (lang) => {
        const storedCampaignParams = loadCampaignParams();
        const currentCampaignParams = extractCampaignParams(window.location.search);
        const merged = { lang, ...storedCampaignParams, ...currentCampaignParams };
        navLinks.forEach((link) => {
          const baseHref = link.dataset.baseHref || "./index.html";
          link.setAttribute("href", mergeParamsIntoHref(baseHref, merged));
        });
      };

      const getFilteredPosts = () => {
        const query = viewState.query.trim().toLowerCase();
        return postsData.filter((post) => {
          if (viewState.category !== "all" && post.category !== viewState.category) return false;
          if (!query) return true;
          const title = getLocalizedText(post.title, viewState.lang);
          const summary = getLocalizedText(post.summary, viewState.lang);
          return `${title} ${summary}`.toLowerCase().includes(query);
        });
      };

      const renderPager = (totalPages) => {
        pager.innerHTML = "";
        if (totalPages <= 1) return;
        for (let page = 1; page <= totalPages; page += 1) {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = String(page);
          button.classList.toggle("active", page === viewState.page);
          button.addEventListener("click", () => {
            viewState.page = page;
            updatePostView();
          });
          pager.appendChild(button);
        }
      };

      const buildPostUrl = (post) => {
        const baseUrl = post.url || `./${post.slug}.html`;
        const storedCampaignParams = loadCampaignParams();
        const currentCampaignParams = extractCampaignParams(window.location.search);
        return mergeParamsIntoHref(baseUrl, { lang: viewState.lang, ...storedCampaignParams, ...currentCampaignParams });
      };

      const updatePostView = () => {
        const filtered = getFilteredPosts();
        const totalPages = Math.max(1, Math.ceil(filtered.length / viewState.pageSize));
        if (viewState.page > totalPages) viewState.page = totalPages;
        const start = (viewState.page - 1) * viewState.pageSize;
        const end = start + viewState.pageSize;

        blogGrid.innerHTML = "";
        filtered.slice(start, end).forEach((post) => {
          const categoryLabel = (i18n[viewState.lang] || i18n.ko)[post.category] || post.category;
          const title = escapeHtml(getLocalizedText(post.title, viewState.lang));
          const summary = escapeHtml(getLocalizedText(post.summary, viewState.lang));
          const article = document.createElement("article");
          article.className = "post";
          article.innerHTML = `
            <small>${escapeHtml(categoryLabel)} · ${escapeHtml(post.date || "")}</small>
            <h2><a href="${escapeHtml(buildPostUrl(post))}">${title}</a></h2>
            <p class="muted">${summary}</p>
            <a href="${escapeHtml(buildPostUrl(post))}">${escapeHtml((i18n[viewState.lang] || i18n.ko).readMore)}</a>
          `;
          blogGrid.appendChild(article);
        });

        renderPager(totalPages);
        emptyState.style.display = filtered.length === 0 ? "" : "none";
      };

      const setLang = (lang) => {
        document.documentElement.lang = lang;
        const p = i18n[lang] || i18n.ko;
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.dataset.i18n;
          if (p[key]) el.textContent = p[key];
        });
        document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
          const key = el.dataset.i18nPh;
          if (p[key]) el.placeholder = p[key];
        });
        document.querySelectorAll(".lang").forEach((button) => {
          const isActive = button.dataset.lang === lang;
          button.classList.toggle("active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });
        viewState.lang = lang;
        syncNavLang(lang);
        try {
          window.localStorage.setItem("preferredLang", lang);
        } catch (error) {
          // Ignore storage access errors.
        }
        updatePostView();
      };

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((current) => current.classList.toggle("active", current === tab));
          viewState.category = tab.dataset.category || "all";
          viewState.page = 1;
          updatePostView();
        });
      });

      searchInput.addEventListener("input", (event) => {
        viewState.query = event.target.value || "";
        viewState.page = 1;
        updatePostView();
      });

      document.querySelectorAll(".lang").forEach((button) => {
        button.addEventListener("click", () => setLang(button.dataset.lang));
      });

      if (themeToggleButton) {
        themeToggleButton.addEventListener("click", () => {
          const currentTheme = getResolvedTheme();
          const nextTheme = currentTheme === "dark" ? "light" : "dark";
          document.documentElement.dataset.theme = nextTheme;
          try {
            window.localStorage.setItem("preferredTheme", nextTheme);
          } catch (error) {
            // Ignore storage access errors.
          }
          syncThemeToggle();
        });
      }

      const loadBlogData = async () => {
        try {
          const response = await fetch("./data/blog_posts.json");
          if (!response.ok) throw new Error("Failed to fetch blog_posts.json");
          const data = await response.json();
          postsData = Array.isArray(data) ? data : [];
          loadingState.style.display = "none";
          updatePostView();
        } catch (error) {
          loadingState.dataset.i18n = "loadFail";
          loadingState.textContent = (i18n[viewState.lang] || i18n.ko).loadFail;
        }
      };

      storeCampaignParams(window.location.search);
      applyStoredTheme();
      syncThemeToggle();
      setLang(getInitialLang());
      loadBlogData();
    </script>
  </body>
</html>
